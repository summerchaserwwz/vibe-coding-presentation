<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- Model node gradients -->
    <linearGradient id="claudeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97757" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <linearGradient id="gptGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <linearGradient id="geminiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="cnGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="100%" height="100%" rx="16" fill="url(#bg)" />

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="1" stroke-dasharray="4,4">
    <!-- Horizontal -->
    <line x1="80" y1="360" x2="850" y2="360" />
    <line x1="80" y1="280" x2="850" y2="280" />
    <line x1="80" y1="200" x2="850" y2="200" />
    <line x1="80" y1="120" x2="850" y2="120" />
    
    <!-- Vertical -->
    <line x1="200" y1="80" x2="200" y2="380" />
    <line x1="400" y1="80" x2="400" y2="380" />
    <line x1="600" y1="80" x2="600" y2="380" />
    <line x1="800" y1="80" x2="800" y2="380" />
  </g>

  <!-- Axes -->
  <g stroke="#94a3b8" stroke-width="2">
    <line x1="80" y1="380" x2="850" y2="380" marker-end="url(#arrow)" />
    <line x1="80" y1="380" x2="80" y2="80" marker-end="url(#arrow)" />
  </g>

  <!-- Axis Labels -->
  <text x="465" y="420" fill="#cbd5e1" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">上下文吞吐量极限 (Tokens 规模)</text>
  <text x="40" y="230" fill="#cbd5e1" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" transform="rotate(-90 40 230)">代码重构与推理深度 (SWE-bench 指标)</text>

  <!-- Title -->
  <text x="450" y="45" fill="#f8fafc" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">2026 年主流 AI 编程大模型能力分布矩阵</text>

  <!-- Markers (X Axis) -->
  <text x="200" y="400" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">100K</text>
  <text x="400" y="400" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">500K</text>
  <text x="600" y="400" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">100万 (1M)</text>
  <text x="800" y="400" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="middle">200万+</text>

  <!-- Markers (Y Axis) -->
  <text x="70" y="285" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="end">70%</text>
  <text x="70" y="205" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="end">75%</text>
  <text x="70" y="125" fill="#64748b" font-family="sans-serif" font-size="12" text-anchor="end">80%</text>

  <!-- Nodes -->
  
  <!-- Claude Opus -->
  <g transform="translate(240, 100)" filter="url(#glow)">
    <circle cx="0" cy="0" r="28" fill="url(#claudeGrad)" opacity="0.9"/>
    <text x="0" y="45" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Claude Opus 4.6</text>
    <text x="0" y="60" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">架构推理巅峰</text>
  </g>

  <!-- GPT-5.4 -->
  <g transform="translate(280, 130)" filter="url(#glow)">
    <circle cx="0" cy="0" r="25" fill="url(#gptGrad)" opacity="0.9"/>
    <text x="0" y="42" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">GPT-5.4</text>
    <text x="0" y="57" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">桌面控制接管</text>
  </g>

  <!-- Gemini 3.1 Pro -->
  <g transform="translate(600, 160)" filter="url(#glow)">
    <circle cx="0" cy="0" r="35" fill="url(#geminiGrad)" opacity="0.9"/>
    <text x="0" y="52" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Gemini 3.1 Pro</text>
    <text x="0" y="67" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">海量代码全库吞吐</text>
  </g>

  <!-- Qwen 3.5 Max -->
  <g transform="translate(580, 220)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="url(#cnGrad)" opacity="0.9"/>
    <text x="0" y="38" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Qwen 3.5 Max</text>
  </g>

  <!-- MiniMax M2.5 -->
  <g transform="translate(750, 250)" filter="url(#glow)">
    <circle cx="0" cy="0" r="22" fill="url(#cnGrad)" opacity="0.9"/>
    <text x="0" y="38" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">MiniMax Text-01</text>
    <text x="0" y="53" fill="#cbd5e1" font-family="sans-serif" font-size="11" text-anchor="middle">极限长文回溯</text>
  </g>

  <!-- Kimi K2.5 -->
  <g transform="translate(320, 250)" filter="url(#glow)">
    <circle cx="0" cy="0" r="18" fill="url(#cnGrad)" opacity="0.9"/>
    <text x="0" y="35" fill="#f8fafc" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Kimi 2.5</text>
  </g>

  <!-- Legend -->
  <g transform="translate(720, 30)">
    <rect width="140" height="auto" fill="none"/>
    <circle cx="0" cy="0" r="6" fill="url(#claudeGrad)" />
    <text x="15" y="4" fill="#cbd5e1" font-family="sans-serif" font-size="12">Anthropic</text>
    <circle cx="0" cy="20" r="6" fill="url(#gptGrad)" />
    <text x="15" y="24" fill="#cbd5e1" font-family="sans-serif" font-size="12">OpenAI</text>
    <circle cx="0" cy="40" r="6" fill="url(#geminiGrad)" />
    <text x="15" y="44" fill="#cbd5e1" font-family="sans-serif" font-size="12">Google</text>
    <circle cx="0" cy="60" r="6" fill="url(#cnGrad)" />
    <text x="15" y="64" fill="#cbd5e1" font-family="sans-serif" font-size="12">国产大模型</text>
  </g>
</svg>
