<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="success" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>

    <linearGradient id="warning" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="450" rx="16" fill="url(#bg)" />
  <text x="400" y="40" fill="#F8FAFC" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">API 聚合网关与多模型路由架构图 (OneRouter 等)</text>

  <!-- User / CLI Side -->
  <g transform="translate(50, 160)" filter="url(#shadow)">
    <rect width="140" height="120" rx="12" fill="#1E293B" stroke="#475569" stroke-width="2"/>
    <text x="70" y="40" fill="#F1F5F9" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">开发者终端</text>
    <rect x="20" y="55" width="100" height="24" rx="4" fill="#334155"/>
    <text x="70" y="72" fill="#94A3B8" font-family="sans-serif" font-size="12" text-anchor="middle">Claude Code</text>
    <rect x="20" y="85" width="100" height="24" rx="4" fill="#334155"/>
    <text x="70" y="102" fill="#94A3B8" font-family="sans-serif" font-size="12" text-anchor="middle">Codex / Cline</text>
  </g>

  <!-- Lines from Client to Gateway -->
  <path d="M 190 220 L 320 220" stroke="#64748B" stroke-width="3" marker-end="url(#arrowHead)" stroke-dasharray="6,4" />
  <rect x="220" y="195" width="80" height="20" rx="4" fill="#0F172A"/>
  <text x="260" y="209" fill="#38BDF8" font-family="sans-serif" font-size="10" font-weight="bold" text-anchor="middle">统一 API Key</text>

  <!-- Gateway (OneRouter) -->
  <g transform="translate(330, 120)" filter="url(#shadow)">
    <rect width="140" height="200" rx="16" fill="#1E293B" stroke="url(#primary)" stroke-width="3"/>
    <rect width="140" height="50" rx="16" fill="url(#primary)"/>
    <rect y="30" width="140" height="20" fill="url(#primary)"/>
    <text x="70" y="32" fill="#FFFFFF" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">聚合网关</text>
    <text x="70" y="90" fill="#CBD5E1" font-family="sans-serif" font-size="13" text-anchor="middle">智能路由分发</text>
    <text x="70" y="120" fill="#CBD5E1" font-family="sans-serif" font-size="13" text-anchor="middle">全局并发控制</text>
    <text x="70" y="150" fill="#CBD5E1" font-family="sans-serif" font-size="13" text-anchor="middle">统一计费结算</text>
    <text x="70" y="180" fill="#38BDF8" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">(OneRouter 等)</text>
  </g>

  <!-- Lines from Gateway to Models -->
  <path d="M 470 160 Q 520 160 560 90" stroke="#64748B" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 470 190 Q 520 190 560 170" stroke="#64748B" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 470 250 Q 520 250 560 270" stroke="#64748B" stroke-width="2" marker-end="url(#arrowHead)"/>
  <path d="M 470 280 Q 520 280 560 350" stroke="#64748B" stroke-width="2" marker-end="url(#arrowHead)"/>

  <!-- Models -->
  <g transform="translate(570, 60)" filter="url(#shadow)">
    <rect width="160" height="60" rx="8" fill="#1E293B" stroke="#6366F1" stroke-width="2"/>
    <text x="80" y="28" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Claude 3.5 / 4.6</text>
    <text x="80" y="48" fill="#818CF8" font-family="sans-serif" font-size="11" text-anchor="middle">Anthropic 国际专线</text>
  </g>

  <g transform="translate(570, 140)" filter="url(#shadow)">
    <rect width="160" height="60" rx="8" fill="#1E293B" stroke="#10B981" stroke-width="2"/>
    <text x="80" y="28" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">GPT-5 系列 / o 系列</text>
    <text x="80" y="48" fill="#34D399" font-family="sans-serif" font-size="11" text-anchor="middle">OpenAI 国际专线</text>
  </g>

  <g transform="translate(570, 240)" filter="url(#shadow)">
    <rect width="160" height="60" rx="8" fill="#1E293B" stroke="#F43F5E" stroke-width="2"/>
    <text x="80" y="28" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">MiniMax / Kimi</text>
    <text x="80" y="48" fill="#FB7185" font-family="sans-serif" font-size="11" text-anchor="middle">国内超长上下文/高并发</text>
  </g>

  <g transform="translate(570, 320)" filter="url(#shadow)">
    <rect width="160" height="60" rx="8" fill="#1E293B" stroke="#F59E0B" stroke-width="2"/>
    <text x="80" y="28" fill="#E2E8F0" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Qwen / DeepSeek</text>
    <text x="80" y="48" fill="#FBBF24" font-family="sans-serif" font-size="11" text-anchor="middle">国内高性价比开源节点</text>
  </g>

  <text x="400" y="420" fill="#94A3B8" font-family="sans-serif" font-size="12" text-anchor="middle">只需修改 Base URL，开发者即可通过网关无缝调度全球所有顶级与本土开源模型</text>
</svg>
